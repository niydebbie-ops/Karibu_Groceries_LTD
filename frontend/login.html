<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KGL Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/login.css?v=20260306">
  <link rel="stylesheet" href="css/professional-theme.css?v=20260360">
</head>
<body class="login-page premium-app">
  <section class="banner container-fluid px-0">
    <img src="images/banner.jpg" alt="Login Banner" class="banner-img">

    <div class="login-container card shadow-lg">
      <span class="company-badge form-logo" aria-label="KGL Logo">KGL</span>
      <h1 class="welcome-title">Welcome to Karibu Groceries LTD </h1>
      <p class="welcome-subtitle">Sign in to access your KGL dashboard.</p>
      <h4 class="login-heading">Login</h4>

      <form id="loginForm" class="form-modern" novalidate>
        <div id="toastContainer" class="toast-container"></div>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <div class="input-with-icon">
            <span class="field-icon" aria-hidden="true">✉</span>
            <input type="email" id="loginEmail" placeholder="Enter your email">
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrap">
            <span class="field-icon" aria-hidden="true">🔒</span>
            <input type="password" id="loginPassword" placeholder="Enter your password">
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password" title="Show password">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.2 12c2.1-3.7 5.8-6 9.8-6s7.7 2.3 9.8 6c-2.1 3.7-5.8 6-9.8 6s-7.7-2.3-9.8-6Z"></path>
                <circle cx="12" cy="12" r="3.2"></circle>
              </svg>
              <svg class="eye-icon eye-closed hidden" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M2.2 12c2.1-3.7 5.8-6 9.8-6 1.7 0 3.3.4 4.7 1.2M21.8 12c-.8 1.4-1.9 2.6-3.2 3.6A10.8 10.8 0 0 1 12 18c-4 0-7.7-2.3-9.8-6"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="remember-wrap">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot password?</a>
        </div>

        <div class="form-group center">
          <button type="submit" class="btn-small">Login </button>
        </div>
      </form>

      <div class="form-footer">
        <p>&copy; 2026 Karibu Groceries LTD. All rights reserved.</p>
      </div>
    </div>
  </section>

  <script src="js/auth.js?v=20260303"></script>
</body>
</html>
