<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Director Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/manager.css?v=20260315">
  <link rel="stylesheet" href="css/professional-theme.css?v=20260365">
</head>
<body class="director-dashboard premium-app">
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Director Dashboard</h2>
      <a href="#" class="sidebar-link" data-target="summary" data-icon="📊">Dashboard</a>
      <a href="#" class="sidebar-link" data-target="users" data-icon="👥">Users</a>
      <a href="#" class="sidebar-link" data-target="branches" data-icon="🏬">Branches</a>
      <button id="logoutBtn" class="logout" data-icon="🚪">Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-hero card">
        <h2 class="company-mark">
          <span class="company-mark-main">
            <span class="company-badge">KGL</span>
            <span class="company-name">Karibu Groceries LTD</span>
          </span>
          <span class="hero-user-chip" id="directorUserChip">
            <span class="user-icon">👤</span>
            <span class="user-name">Director</span>
          </span>
        </h2>
      </header>
      

      <!-- Dynamic container -->
      <div id="contentArea"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/confirm-modal.js?v=20260302"></script>
  <script src="js/director.js?v=20260373"></script>
</body>
</html>
