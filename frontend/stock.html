<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Current Stock</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/manager.css">
  <link rel="stylesheet" href="css/professional-theme.css?v=20260360">
  
   
  
</head>
<body class="manager-dashboard premium-app">
  <div class="main-content">
    <section id="stockSection" class="card">
      <h2 class="section-title"><span class="icon">📦</span><span>Current Stock</span></h2>

      <!-- Add Stock Form -->
      <form id="stockForm" class="form-modern">
        <input type="hidden" id="stockId" />
        <input id="stockItemName" type="text" placeholder="Produce Name" required />
        <input id="stockUnit" placeholder="Unit (kg, bags, crates)" required />
        <input id="stockQuantity" type="number" placeholder="Tonnage (KGs)" required />
        <input id="stockBranch" placeholder="Branch Name" readonly required />
      
        <button type="submit">Save Stock</button>
      </form>
      <p id="stockMessage"></p>

      <!-- Stock Table -->
      <div class="table-scroll">
        <table id="stockTable" class="table-modern">
          <thead>
            <tr>
              <th>Produce Name</th>
              <th>Unit</th>
              <th>Tonnage (KGs)</th>
              <th>Branch Name</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <!-- JS for stock logic -->
  <script src="js/confirm-modal.js?v=20260302"></script>
  <script src="js/stock.js?v=20260302"></script>
</body>
</html>
